<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registro de Intercorrência</title>
</head>
<body>

<div class="classificacao">
    <h2>Classificação</h2>
    <label><input type="radio" name="gravidade"> Leve</label>
    <label><input type="radio" name="gravidade"> Médio</label>
    <label><input type="radio" name="gravidade"> Grave</label>
</div>

<!-- LEVE -->
<div class="box-opcoes leve-box">
    <h3>LEVE</h3>
    <label><input type="checkbox"> Batidas</label>
    <label><input type="checkbox"> Quedas por altura</label>
    <label><input type="checkbox"> Trombadas</label>
    <label><input type="checkbox"> Sangramento</label>
    <label><input type="checkbox"> Arranhões sem profundidade</label>
    <label><input type="checkbox"> Outros</label>
    <input type="text" placeholder="Descreva outros...">
</div>

<!-- MÉDIO -->
<div class="box-opcoes medio-box">
    <h3>MÉDIO</h3>
    <label><input type="checkbox"> Bateu a cabeça</label>
    <label><input type="checkbox"> Pequena entorse</label>
    <label><input type="checkbox"> Hiperextensão (joelho, cotovelo ou pescoço)</label>
    <label><input type="checkbox"> Queda maior que a altura da criança</label>
    <label><input type="checkbox"> Imobilização com tala (sem edema)</label>
    <label><input type="checkbox"> Outros</label>
    <input type="text" placeholder="Descreva outros...">
</div>

<!-- GRAVE -->
<div class="box-opcoes grave-box">
    <h3>GRAVE</h3>
    <label><input type="checkbox"> Corte profundo que necessite de pontos </label>
    <label><input type="checkbox"> Bater a cabeça com edema </label>
    <label><input type="checkbox"> Entorse com edema (inchaço instantaneo, rouxidão, dificuldade de mobilidade pelo excesso de dor) e necessidade de imobilizar</label>
    <label><input type="checkbox"> Outros</label>
    <input type="text" placeholder="Descreva outros...">
</div>

<div class="container">
    <h1>Registro de Intercorrência</h1>

    <form>
        <div class="linha-dupla">
            <input type="text" placeholder="Nome da criança" required>
            <input type="text" placeholder="Sobrenome da criança" required>
        </div>

        <div class="linha-dupla">
            <input type="text" placeholder="Turma" required>
            <input type="time" required>
        </div>

        <input type="text" placeholder="Professor" required>

        <textarea placeholder="Descreva a intercorrência..." required></textarea>

        <button type="submit">Enviar Registro</button>
    </form>
</div>

</body>
</html>
